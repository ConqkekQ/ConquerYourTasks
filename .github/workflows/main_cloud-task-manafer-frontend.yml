name: Build and deploy Node.js app to Azure Web App - cloud-task-manager-frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build
        run: |
          npm install
          npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: "https://cloud-task-manager-api-100241-bceedqfwefh3a9dv.polandcentral-01.azurewebsites.net/index.html"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F9880021FD7A4EACA1F8828C1E62EE5D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C7BA795C57DE4D998C1A91D29BE5EBF9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_09ECE3DD9A7B4482A682FA8D20FAF816 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cloud-task-manafer-frontend'
          package: dist
          startup-command: "pm2 serve /home/site/wwwroot --no-daemon --spa"
 
